name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - feature/full-stack
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  pull_request:
    branches:
      - main
      - master
      - feature/full-stack
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint || echo "Lint warnings found, proceeding..."

      - name: Run Security Scan
        run: npm audit --audit-level=moderate || echo "Audit warnings found, proceeding..."

      - name: Run Unit Tests
        run: npm run test

      - name: Retrieve ALB Endpoint (Dynamic Configuration)
        id: alb-lookup
        run: |
          # If VITE_API_BASE_URL secret is set, use it. Otherwise, query AWS SSM Parameter Store or ALB.
          if [ -n "${{ secrets.VITE_API_BASE_URL }}" ]; then
            echo "api_url=${{ secrets.VITE_API_BASE_URL }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "Retrieving ALB endpoint from AWS..."
            # Setup AWS CLI credentials temporarily
            mkdir -p ~/.aws
            echo "[default]" > ~/.aws/credentials
            echo "aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
            echo "aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
            # Query ALB DNS Name dynamically by name prefix to support dynamic suffixes
            ALB_DNS=$(aws elbv2 describe-load-balancers --region ${{ secrets.AWS_REGION || 'us-east-1' }} --query "LoadBalancers[?contains(LoadBalancerName, 'techcorp-backend-alb')].DNSName" --output text 2>/dev/null | tr -d '\r\n' || echo "localhost:8080")
            echo "api_url=http://${ALB_DNS}" >> $GITHUB_OUTPUT
          else
            echo "AWS Credentials/Secret not set. Falling back to default backend URL."
            echo "api_url=http://localhost:8080" >> $GITHUB_OUTPUT
          fi

      - name: Build Application
        env:
          VITE_API_BASE_URL: ${{ steps.alb-lookup.outputs.api_url }}
        run: npm run build

      - name: Upload Build Artifacts
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/full-stack'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy:
    name: Deploy to Production
    needs: build-and-test
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/feature/full-stack') && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Deploy to S3 Bucket
        run: |
          # Clean secret input and strip any whitespace/carriage returns
          S3_BUCKET=$(echo "${{ secrets.FRONTEND_S3_BUCKET }}" | tr -d '[:space:]')
          if [ -z "$S3_BUCKET" ]; then
            echo "FRONTEND_S3_BUCKET secret not set. Querying AWS S3..."
            S3_BUCKET=$(aws s3 ls | grep "starttech-frontend-${{ secrets.ENVIRONMENT || 'prod' }}" | awk '{print $3}' | head -n 1 | tr -d '[:space:]')
            echo "Resolved S3 Bucket: '$S3_BUCKET'"
          fi

          if [ -z "$S3_BUCKET" ]; then
            echo "Error: Could not resolve target S3 bucket."
            exit 1
          fi

          # Save bucket name for the next step
          echo "RESOLVED_S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV

          # Sync build files to the React static hosting S3 bucket
          aws s3 sync dist/ "s3://${S3_BUCKET}" --delete --cache-control "max-age=31536000,public"
          
          # Force no-cache on index.html so updates are immediate
          aws s3 cp dist/index.html "s3://${S3_BUCKET}/index.html" --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront Cache
        run: |
          # Resolve CloudFront Distribution ID dynamically if CLOUDFRONT_DISTRIBUTION_ID secret is not set
          DIST_ID=$(echo "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" | tr -d '[:space:]')
          if [ -z "$DIST_ID" ]; then
            echo "CLOUDFRONT_DISTRIBUTION_ID secret not set. Querying AWS CloudFront..."
            # Try searching by matching the regional S3 origin domain
            DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?contains(Origins.Items[0].DomainName, '$RESOLVED_S3_BUCKET')].Id" --output text | head -n 1 | tr -d '[:space:]')
            
            # If not found or None, search by Comment or Origin ID containing starttech or S3-Frontend
            if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
              DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?contains(Comment, 'starttech') || contains(Origins.Items[0].Id, 'S3-Frontend')].Id" --output text | head -n 1 | tr -d '[:space:]')
            fi
            echo "Resolved CloudFront Distribution ID: '$DIST_ID'"
          fi

          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            echo "Warning: Could not resolve CloudFront distribution. Skipping invalidation."
          else
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/*"
          fi

      - name: Send Deployment Notification
        if: always()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{"text":"🚀 *StartTech Frontend Deployment Successful!* \nCF Invalidation triggered. Visit: http://${{ secrets.FRONTEND_DOMAIN || 'S3 website' }}"}' \
              ${{ secrets.SLACK_WEBHOOK_URL }}
          else
            echo "Deployment completed successfully. Notification skipped (no SLACK_WEBHOOK_URL secret)."
          fi
