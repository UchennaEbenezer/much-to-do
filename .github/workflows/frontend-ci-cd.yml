name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint || echo "Lint warnings found, proceeding..."

      - name: Run Security Scan
        run: npm audit --audit-level=moderate || echo "Audit warnings found, proceeding..."

      - name: Run Unit Tests
        run: npm run test

      - name: Retrieve ALB Endpoint (Dynamic Configuration)
        id: alb-lookup
        run: |
          # If VITE_API_BASE_URL secret is set, use it. Otherwise, query AWS SSM Parameter Store or ALB.
          if [ -n "${{ secrets.VITE_API_BASE_URL }}" ]; then
            echo "api_url=${{ secrets.VITE_API_BASE_URL }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "Retrieving ALB endpoint from AWS..."
            # Setup AWS CLI credentials temporarily
            mkdir -p ~/.aws
            echo "[default]" > ~/.aws/credentials
            echo "aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
            echo "aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
            # Query ALB DNS Name
            ALB_DNS=$(aws elbv2 describe-load-balancers --names "techcorp-backend-alb" --region ${{ secrets.AWS_REGION || 'us-east-1' }} --query "LoadBalancers[0].DNSName" --output text 2>/dev/null || echo "localhost:8080")
            echo "api_url=http://${ALB_DNS}" >> $GITHUB_OUTPUT
          else
            echo "AWS Credentials/Secret not set. Falling back to default backend URL."
            echo "api_url=http://localhost:8080" >> $GITHUB_OUTPUT
          fi

      - name: Build Application
        env:
          VITE_API_BASE_URL: ${{ steps.alb-lookup.outputs.api_url }}
        run: npm run build

      - name: Upload Build Artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy:
    name: Deploy to Production
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Deploy to S3 Bucket
        run: |
          # Sync build files to the React static hosting S3 bucket
          aws s3 sync dist/ s3://${{ secrets.FRONTEND_S3_BUCKET }} --delete --cache-control "max-age=31536000,public"
          
          # Force no-cache on index.html so updates are immediate
          aws s3 cp dist/index.html s3://${{ secrets.FRONTEND_S3_BUCKET }}/index.html --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Send Deployment Notification
        if: always()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{"text":"🚀 *StartTech Frontend Deployment Successful!* \nCF Invalidation triggered. Visit: http://${{ secrets.FRONTEND_DOMAIN || '\''S3 website'\'' }}"}' \
              ${{ secrets.SLACK_WEBHOOK_URL }}
          else
            echo "Deployment completed successfully. Notification skipped (no SLACK_WEBHOOK_URL secret)."
          fi
